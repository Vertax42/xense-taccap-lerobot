# Record recipe — bimanual Elite CS66 RT (diagonal mount) + Bi-Pico4. SMOKE TEST.
#   lerobot-record --config_path=recipes/record/bi_elite_cs66_rt/test.yaml
#
# Only the frequently-changed knobs are listed; everything else uses the dataclass
# default. Station hardware (cameras, gripper SNs, mount geometry, local_ip,
# home/start poses) comes from the bi_mount_type preset and is not settable here.
# The robot:/teleop: blocks mirror the teleop recipe — keep them in sync.

robot:
  type: bi_elite_cs66_rt
  bi_mount_type: diagonal
  left_robot_ip: 192.168.8.53
  right_robot_ip: 192.168.8.223
  control_mode: cartesian_servo # cartesian_servo | joint_servo
  servoj_gain: 300 # [100, 2000]
  left_use_gripper: true
  right_use_gripper: true
  gripper_f_max: 30.0 # N
  enable_tactile_sensors: true

teleop:
  type: bi_pico4
  pos_sensitivity: 1.0
  ori_sensitivity: 1.0

dataset:
  repo_id: Xense/bi_elite_cs66_rt_test
  single_task: "pick up the cube and place it in the box"
  fps: 30 # must equal teleop fps
  episode_time_s: 60
  reset_time_s: 15
  num_episodes: 2
  video: true
  push_to_hub: false
  private: false

# ── Record loop (top level) ──
display_data: true
resume: false
