# Record recipe — bimanual Flexiv Rizon4 RT (forward mount) + Bi-Pico4.
#   lerobot-record --config_path=recipes/record/bi_flexiv_rizon4_rt/assemble_box.yaml
#
# Only the frequently-changed knobs are listed; everything else uses the dataclass
# default. Station hardware (robot & gripper SNs, cameras, home/start poses) comes
# from the bi_mount_type preset and is not settable here. The robot:/teleop: blocks
# mirror the teleop recipe — keep them in sync.

robot:
  type: bi_flexiv_rizon4_rt
  bi_mount_type: forward # forward | forward_dewu | side | diagonal
  use_force: false
  log_level: INFO
  left_use_gripper: true
  right_use_gripper: true
  gripper_f_max: 40.0 # N
  enable_tactile_sensors: true

teleop:
  type: bi_pico4
  pos_sensitivity: 1.0
  ori_sensitivity: 1.0

dataset:
  repo_id: Xense/assemble_box_with_phone_stand0430_merged
  single_task: "Assemble the packaging by folding the flat box into shape, placing the metal phone stand inside, and closing the box properly"
  fps: 30 # must equal teleop fps
  episode_time_s: 600
  reset_time_s: 120
  num_episodes: 5
  video: true
  push_to_hub: true

# ── Record loop (top level) ──
display_data: false
resume: true
