# Teleop recipe — bimanual Flexiv Rizon4 RT (forward mount) + Bi-Pico4.
#   lerobot-teleoperate --config_path=recipes/teleop/bi_flexiv_rizon4_rt/forward.yaml
#
# Only the frequently-changed knobs are listed; everything else uses the dataclass
# default. Station hardware comes from the bi_mount_type preset and is not settable
# here. The robot:/teleop: blocks mirror the record recipe — keep them in sync.

robot:
  type: bi_flexiv_rizon4_rt
  bi_mount_type: forward # forward | forward_dewu | side | diagonal
  use_force: false
  log_level: INFO
  left_use_gripper: true
  right_use_gripper: true
  gripper_f_max: 40.0 # N
  enable_tactile_sensors: true

teleop:
  type: bi_pico4
  pos_sensitivity: 1.0
  ori_sensitivity: 1.0

# ── Teleoperate loop (top level) ──
fps: 30
display_data: true
