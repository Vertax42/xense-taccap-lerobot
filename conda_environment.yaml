name: lerobot-xense
channels:
  - conda-forge
  - nvidia
  - nodefaults
dependencies:
  - python=3.12
  # ── Build tools (taccap libxense-lite + pico4 C++ builds) ─────────────────
  - cxx-compiler
  - cmake>=3.25
  - ninja
  # ── C++ libraries (taccap libxense-lite: find_package Eigen3 + pybind11; it
  #    FetchContent's its own spdlog, so no conda spdlog needed) ──────────────
  - pybind11
  - eigen=3.4.0
  - libstdcxx-ng # newer CXXABI symbols (xensevr_pc_service_sdk)
  # ── taccap-gripper C++ build deps (libxense-lite) ─────────────────────────
  # OpenCV C++ headers, nlohmann_json and zlib (dev: libz.so) that the lerobot
  # env does not otherwise ship. libopencv is the C++ runtime only; the pip
  # opencv-python wheel (import cv2) is self-contained and unaffected.
  - libopencv==4.12
  - nlohmann_json=3.11.3
  - zlib=1.3.1 # dev pkg: provides linkable libz.so for libxensesdk find_package(ZLIB)
  - pkg-config
  - make
  # ── CUDA (xensesdk / onnxruntime-gpu) ─────────────────────────────────────
  - nvidia::cuda-toolkit=12.8
  - nvidia::cudnn
  # ── Video (torchcodec / av) ────────────────────────────────────────────────
  # PyAV/torchcodec are installed from wheels later in setup_env.sh; ffmpeg is
  # kept out of the conda solve to avoid ICU/libxml2 conflicts.
  # ── Python base tools ─────────────────────────────────────────────────────
  - numpy>=1.26.4 # pip installs (xensesdk) constrain the upper bound (<2.3.0)
  - pip
  - wheel
  - pip:
      - uv
      - pyrealsense2
      - matplotlib
